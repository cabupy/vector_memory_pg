services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL 17 + pgvector  (imagen oficial pgvector/pgvector)
  # pgvector es compatible con PG 12-17; PG 17 es el más estable.
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-vector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vector}
      POSTGRES_DB:       ${POSTGRES_DB:-vector_memory}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vector} -d ${POSTGRES_DB:-vector_memory}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────────────────────
  # HTTP API + MCP — solo se levanta con: docker compose --profile full up
  # ─────────────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    profiles:
      - full
    environment:
      DATABASE_URL:    postgres://${POSTGRES_USER:-vector}:${POSTGRES_PASSWORD:-vector}@postgres:5432/${POSTGRES_DB:-vector_memory}
      OPENAI_API_KEY:  ${OPENAI_API_KEY}
      API_PORT:        ${API_PORT:-3010}
    ports:
      - "${API_PORT:-3010}:3010"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
